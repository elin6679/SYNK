<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 뷰티 & 스타일 진단기 프로토타입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF9;
            color: #1A1A1A;
            -webkit-tap-highlight-color: transparent;
        }
        .beauty-pink { color: #FF85A1; }
        .bg-beauty-pink { background-color: #FF85A1; }
        .beauty-beige { background-color: #FDFBF9; }
        .beauty-shadow {
            box-shadow: 0 20px 40px rgba(255, 133, 161, 0.1);
        }
        .beauty-glow {
            text-shadow: 0 0 20px rgba(255, 133, 161, 0.4);
        }
        @keyframes scan-line {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }
        .animate-scan-line {
            animation: scan-line 2s linear infinite;
        }
        .guide-ellipse {
            border: 2px dashed rgba(255, 133, 161, 0.5);
            border-radius: 50%;
            width: 70%;
            height: 60%;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="beauty-beige h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between">
        <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center opacity-0">
            <!-- Space for balance -->
        </div>
        <h1 class="text-xl font-black tracking-tight">BEAUTY ANALYZER</h1>
        <div class="w-12 h-12 rounded-2xl bg-black flex items-center justify-center text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-6 pb-6 mt-4 flex flex-col">
        <div id="camera-container" class="relative flex-1 w-full bg-white rounded-[3rem] overflow-hidden beauty-shadow border-8 border-white">
            <!-- Camera Viewport -->
            <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover"></video>
            
            <!-- Guide Overlay -->
            <div id="guide-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="guide-ellipse"></div>
                <!-- Grid Lines -->
                <div class="absolute inset-0 opacity-10">
                    <div class="absolute left-1/3 top-0 bottom-0 border-l border-beauty-pink"></div>
                    <div class="absolute left-2/3 top-0 bottom-0 border-l border-beauty-pink"></div>
                    <div class="absolute top-1/3 left-0 right-0 border-t border-beauty-pink"></div>
                    <div class="absolute top-2/3 left-0 right-0 border-t border-beauty-pink"></div>
                </div>
            </div>

            <!-- Analysis UI -->
            <div id="analysis-ui" class="absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center gap-8 hidden z-50">
                <div id="progress-text" class="text-7xl font-black beauty-pink beauty-glow">0%</div>
                <div class="w-64 space-y-3 text-center">
                    <p id="status-text" class="text-xs font-black tracking-widest text-black/40 uppercase">이미지 캡처 중...</p>
                    <div class="h-1.5 w-full bg-black/5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-beauty-pink" style="width: 0%"></div>
                    </div>
                </div>
                <div class="absolute inset-x-0 h-1 bg-beauty-pink shadow-[0_0_20px_#FF85A1] animate-scan-line top-0"></div>
            </div>

            <!-- Permission Denied -->
            <div id="error-ui" class="absolute inset-0 bg-black flex flex-col items-center justify-center p-12 text-center text-white hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-beauty-pink mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 6-12 12"/><path d="m6 6 12 12"/></svg>
                <p id="error-msg" class="font-bold">카메라 권한이 필요합니다.</p>
            </div>
        </div>

        <!-- Result Container -->
        <div id="result-container" class="mt-4 bg-white rounded-[3rem] p-8 beauty-shadow hidden transition-all duration-700">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 rounded-full bg-[#FFF0F3] flex items-center justify-center text-beauty-pink">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3 class="font-black text-xl">AI 분석 리포트</h3>
            </div>
            <div id="result-grid" class="grid grid-cols-2 gap-3">
                <!-- Result items generated by JS -->
            </div>
        </div>
    </main>

    <!-- Footer Action -->
    <footer id="action-footer" class="p-6 pt-0">
        <button id="start-btn" class="w-full h-20 rounded-[2.5rem] bg-black text-white flex items-center justify-center gap-4 text-xl font-black beauty-shadow active:scale-95 transition-all">
            <span>스캔 및 스타일 분석 시작</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
        <div id="reset-btns" class="flex gap-3 hidden">
            <button id="retry-btn" class="flex-1 h-16 rounded-3xl bg-white border-2 border-black/5 font-black flex items-center justify-center gap-2">다시 시도</button>
            <button id="save-btn" class="flex-1 h-16 rounded-3xl bg-beauty-pink text-white font-black beauty-shadow flex items-center justify-center gap-2">저장하기</button>
        </div>
    </footer>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const resetBtns = document.getElementById('reset-btns');
        const analysisUI = document.getElementById('analysis-ui');
        const resultContainer = document.getElementById('result-container');
        const resultGrid = document.getElementById('result-grid');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const errorUI = document.getElementById('error-ui');
        const errorMsg = document.getElementById('error-msg');

        const faceShapes = ['계란형', '둥근형', '각형', '역삼각형', '하트형'];
        const personalColors = ['봄 웜 클리어', '여름 쿨 라이트', '가을 웜 뮤트', '겨울 쿨 딥'];
        const styles = ['미니멀 시크', '러블리 페미닌', '스트릿 힙', '고프코어', '올드머니 룩'];
        const makeupItems = ['글로시 립 틴트', '코랄 오렌지 블러셔', '브라운 펜슬 라이너', '쉬머 하이라이터'];

        const statuses = [
            '얼굴 인식 및 포인트 맵핑 중...',
            '피부톤 및 퍼스널 컬러 진단 중...',
            '헤어 스타일 및 얼굴 비율 분석 중...',
            '현재 스타일 지표 계산 중...',
            '트렌드 기반 아이템 매칭 중...',
            '진단 완료'
        ];

        // Initialize Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' },
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera Error:", err);
                errorUI.classList.remove('hidden');
                errorMsg.innerText = "카메라에 접근할 수 없습니다. 권한을 확인해주세요.";
            }
        }

        // Start Analysis Process
        async function runAnalysis() {
            startBtn.classList.add('hidden');
            analysisUI.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            for (let progress = 0; progress <= 100; progress += 2) {
                progressText.innerText = progress + '%';
                progressBar.style.width = progress + '%';
                
                const statusIdx = Math.min(Math.floor((progress / 100) * statuses.length), statuses.length - 1);
                statusText.innerText = statuses[statusIdx];

                await new Promise(r => setTimeout(r, 40));
            }

            showResults();
        }

        function showResults() {
            analysisUI.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            resetBtns.classList.remove('hidden');

            const results = [
                { label: '얼굴형', value: faceShapes[Math.floor(Math.random() * faceShapes.length)] },
                { label: '퍼스널 컬러', value: personalColors[Math.floor(Math.random() * personalColors.length)] },
                { label: '추천 스타일', value: styles[Math.floor(Math.random() * styles.length)] },
                { label: '추천 아이템', value: makeupItems[Math.floor(Math.random() * makeupItems.length)] }
            ];

            resultGrid.innerHTML = results.map(res => `
                <div class="p-4 rounded-3xl bg-[#FDFBF9] border border-black/5">
                    <p class="text-[10px] font-black uppercase tracking-widest beauty-pink mb-1">${res.label}</p>
                    <p class="text-sm font-bold">${res.value}</p>
                </div>
            `).join('');
        }

        startBtn.addEventListener('click', runAnalysis);
        document.getElementById('retry-btn').addEventListener('click', () => {
            resetBtns.classList.add('hidden');
            startBtn.classList.remove('hidden');
            resultContainer.classList.add('hidden');
        });
        document.getElementById('save-btn').addEventListener('click', () => {
            alert('진단 결과가 내 갤러리에 저장되었습니다.');
        });

        initCamera();
    </script>
</body>
</html>
